name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (agent + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[agent,dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type-check (mypy --strict)
        run: mypy src

      - name: Test with coverage (pytest)
        run: >-
          pytest
          --cov=autotriage
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80

      - name: Security scan (bandit)
        run: bandit -c pyproject.toml -r src

      - name: Dependency audit (pip-audit, informational)
        run: pip-audit
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
