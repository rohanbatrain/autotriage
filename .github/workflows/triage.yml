name: Security triage

# Dogfood: AutoTriage triages its own bundled vulnerable target using the very
# composite action it ships. On a pull request it posts the verdict table as a
# comment. With no ANTHROPIC_API_KEY secret set, the action falls back to the
# deterministic offline backend, so this workflow is green without a credential.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  self-triage:
    name: Triage the bundled target
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: AutoTriage (self-scan)
        uses: ./
        with:
          scan-path: "target"
          codeowners: "target/CODEOWNERS"
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
